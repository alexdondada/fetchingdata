<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Profile</title>
<style>
  :root {
    --bg: #0d0d0f;
    --card-bg: rgba(255,255,255,0.92);
    --accent: #1d9bf0;
    --accent-dark: #0d7fd1;
    --text-dark: #1a1a1a;
    --text-muted: #6b6b6b;
    --offer: #e0245e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ---- Background image ---- */
  .background {
    position: absolute;
    inset: 0;
    background-image: url('https://i.ibb.co/Dg80v1t7/IMG-3407.jpg');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .background::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.35) 100%);
  }

  /* ---- Content wrapper ---- */
  .content {
    position: relative;
    z-index: 1;
    padding: 20px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ---- Profile picture ---- */
  .avatar-wrap {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 5px solid #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    overflow: hidden;
    margin-top: 40px;
    background: #ccc;
    position: relative;
    z-index: 2;
	animation: avatarGlowPulse 1s infinite alternate;
    }
  
  @keyframes avatarGlowPulse {
  from {
    box-shadow: 0 0 10px -10px #aef4af;
  }
  to {
    box-shadow: 0 0 4px 4px #aef4af;
  }
}

  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    object-position: center top;
  }

  /* ---- Card ---- */
  .card {
  opacity:90%;
    margin-top: -40px;
    width: 360px;
    background: var(--card-bg);
    border-radius: 20px;
    backdrop-filter: blur(6px);
    padding: 70px 24px 28px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }

  .name-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .name {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-dark);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #d9f7e3;
    color: #1b7a3e;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 999px;
  }

.verified-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    flex-shrink: 0;
}

.verified-badge svg {
    width: 100%;
    height: 100%;
}

  .status-badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  .bio {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-dark);
    margin: 18px 0 26px;
    padding: 0 6px;
  }

  .cta-button {
  display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .cta-button:active {
    transform: scale(0.98);
    background: var(--accent-dark);
  }

  .cta-button svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .offer {
    margin-top: 22px;
    font-size: 15px;
    color: var(--text-dark);
  }

  .offer strong {
    color: var(--offer);
  }

  .offer .timer {
    font-weight: 800;
    color: var(--text-dark);
    font-variant-numeric: tabular-nums;
  }

  .footer-note {
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }
.send-icon{
    width:24px;
    height:24px;
    flex-shrink:0;
}
.clock-icon {
    display: inline-flex;
    color: #6b7280;
    align-items: center;
    margin-right: 4px;
    opacity: 85%;
    vertical-align: middle;
}

.clock-icon svg {
    width: 22px;
    height: 22px;
}

.icon--Vz0BO {
color: #6b7280;
align-items: center;
display: inline-flex;
vertical-align: middle;
}

.icon--Vz0BO svg {
height: 24px;
width: 24px;
}

.textt, .locationn {
color: #6b7280;
}

.card p {
    margin: 12px 0;
}

.info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
}

</style>
</head>

<script>
async function showVisitorLocation() {
    const locationElement = document.getElementById("location");

    try {
        // Free IP geolocation API
        const response = await fetch("https://ipapi.co/json/");
        const data = await response.json();

        if (data.city && data.country_name) {
            locationElement.textContent = `${data.city}, ${data.country_name}`;
        } else {
            locationElement.textContent = "6 miles away";
        }
    } catch (error) {
        console.error(error);
        locationElement.textContent = "6 miles away";
    }
}

showVisitorLocation();
</script>

<script>
const countdownEl = document.getElementById('countdown');

const COUNTDOWN_SECONDS = 20 * 60; // 60 minutes

let remaining = COUNTDOWN_SECONDS - 1; // Start at 59:59

function updateCountdown() {
    const minutes = Math.floor(remaining / 60);
    const seconds = remaining % 60;

    countdownEl.textContent =
        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

    remaining--;

    // Restart when it reaches 00:00
    if (remaining < 0) {
        remaining = COUNTDOWN_SECONDS - 1;
    }
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
