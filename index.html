<!doctype html>

<button id="go">
Open Safari
</button>

<script>
const ua = navigator.userAgent;

const isInstagram = /Instagram/i.test(ua);
const isIOS = /iPhone|iPad|iPod/i.test(ua);

function safari(url) {
    return "x-safari-" +
        url.replace(/^http:\/\//, "https://");
}

document.getElementById("go").onclick = e => {

    if (isInstagram && isIOS) {

        e.preventDefault();

        window.open(
            safari("https://www.fiverr.com"),
            "_blank"
        );

        return;
    }

    location.href = "https://fiverr.com";
};
</script>
